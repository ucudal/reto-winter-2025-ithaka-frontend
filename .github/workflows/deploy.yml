name: Build and Deploy Docker Image to AKS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gitleaks to detect secrets
        run: |
          docker run --rm -v $(pwd):/path zricethezav/gitleaks:v8.18.2 detect --source=/path

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: crretoxmas2024.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: docker build -t crretoxmas2024.azurecr.io/ithaka-frontend:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.18.0
        with:
          image-ref: crretoxmas2024.azurecr.io/ithaka-frontend:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library

      - name: Push Docker image
        run: docker push crretoxmas2024.azurecr.io/ithaka-frontend:latest

      - name: Set up Kubeconfig
        run: mkdir -p ~/.kube

      - name: Deploy to AKS
        run: |
          kubectl apply -f namespace.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
          kubectl apply -f apisixroute.yaml
          kubectl apply -f horizontal-pod-autoscaler.yaml
